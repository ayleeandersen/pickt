name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main   # change to your default branch if different

# Allow the workflow to write to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Point API calls at your Vercel deployment.
          # Set VITE_API_BASE as a GitHub Actions secret/variable in your repo settings:
          #   Settings → Secrets and variables → Actions → Variables → New repository variable
          #   Name: VITE_API_BASE
          #   Value: https://your-app.vercel.app   (no trailing slash)
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
