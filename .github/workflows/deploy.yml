name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main   # change to your default branch if different

# Allow the workflow to write to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Debug env vars
        run: |
          echo "VITE_BASE_PATH=$VITE_BASE_PATH"
          echo "VITE_API_BASE=$VITE_API_BASE"
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
          # Automatically set the base path from the repo name — no manual variable needed.
          # e.g. for github.com/ayleeandersen/pickt this becomes /pickt/
          VITE_BASE_PATH: /${{ github.event.repository.name }}/


      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
